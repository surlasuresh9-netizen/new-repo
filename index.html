<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<body>
    <div class="container">
        <div class="first_section">
            <h1>Login</h1> 
            <div class="icons">
                <a href="www.facebook.com" target="_blank" class="fa fa-facebook" style="font-size: 24px; color: #030f1e;border-radius:50%; 
    border:1px solid rgb(187, 181, 181); 
    padding:5px 10px;"></a>
                <a href="www.twitter.com" target="_blank" class="fa fa-twitter" style="font-size: 24px; color: #030f1e;"></a>

            </div>
            
            <p>or use your account</p>

            <form class="form1" action="#">
                <input type="text" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <a href="#" class="forgot">Forgot Your password?</a>
                <button type="submit" class="log_btn">LOG IN</button>
            </form>
        </div>

        <div class="second_section">
            <div class="sub_section2">
                <h1>HTML CSS Login Form</h1>
                <p>Facebook login page Clone using HTML and CSS.</p>
            </div>
        </div>
    </div>
</body>
</html>
