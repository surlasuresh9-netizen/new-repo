<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="postermake.css" />
    <base href="Poster/" target="_blank" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Inter:wght@300;400;600&family=Roboto:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container">
      <div class="title">
        <img src="logo.png" alt="company logo" class="logo" />
        <div class="names">
          <img src="all_icons.png" alt="" class="all-icons" />
          <h1 class="name1">Dilshaj</h1>
          <h2 class="name2">Infotech</h2>
        </div>
      </div>

      <div class="tagline">
        <p class="tagline1">Empowering intelligence.</p>
        <p class="tagline2">Building the Future.</p>
      </div>

      <div class="icon-grid">
        <section class="icon1">
          <img src="icon1.png" class="icon" />
          <p class="icoon-text">Al & Machine<br />Learning</p>
        </section>
        <section class="icon2">
          <img src="icon2.png" class="icon" />
          <p class="icoon-text">Software<br />Development</p>
        </section>

        <section class="icon3">
          <img src="icon3.png" class="icon" />
          <p class="icoon-text">Data<br />Analytics</p>
        </section>

        <section class="icon4">
          <img src="icon4.png" class="icon" />
          <p class="icoon-text">IT<br />Consulting</p>
        </section>
      </div>

      <footer>
        <div class="address">
          <img src="browser.png" alt="company logo" class="footer-icon" />
          <a href="https://dilshajinfotech.tech/"
            >https://dilshajinfotech.tech/</a
          >
        </div>

        <div class="contact">
          <img src="phone.png" alt="company logo" class="footer-icon" />
          <p>+91 8977272763</p>
        </div>
      </footer>
    </main>
  </body>
</html>
